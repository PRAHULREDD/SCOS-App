events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Rate Limiting Definition
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Upstreams
    upstream backend_server {
        server backend:8000;
    }

    # HTTP Redirect to HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # HTTPS Server Configuration
    server {
        listen 443 ssl;
        server_name localhost;

        # Self-signed/Local SSL Certificates
        ssl_certificate /etc/nginx/ssl/scos.crt;
        ssl_certificate_key /etc/nginx/ssl/scos.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Rate Limit for APIs
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket live fleet / admin tracking
        location /ws/ {
            proxy_pass http://backend_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }



        # Static Citizen Web App with caching rules
        location /app/ {
            proxy_pass http://backend_server;
            expires 1d;
            add_header Cache-Control "public, no-transform";
        }

        # Redirect root to portal index.html
        location / {
            proxy_pass http://backend_server;
        }
    }
}
