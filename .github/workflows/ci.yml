name: SCOS CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint and Test Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint Code
        run: |
          pip install flake8
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Backend Tests
        run: |
          cd backend
          python -m pytest

  validate-docker:
    name: Validate Docker Configurations
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Validate Docker Compose
        run: |
          docker compose config

      - name: Build Backend Docker Image
        run: |
          docker build -t scos-backend:latest ./backend

      - name: Build AI Docker Image
        run: |
          docker build -t scos-ai:latest ./ai

  deploy:
    name: Continuous Deployment
    needs: [lint-and-test, validate-docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy Production Stack
        run: |
          echo "CI/CD checks passed. Initiating continuous deployment execution..."
          # production deployment commands e.g.:
          # ssh user@server "cd /app/scos && git pull && docker compose -f docker-compose.prod.yml up -d --build"
