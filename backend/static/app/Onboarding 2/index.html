<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bento-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col items-center justify-center overflow-x-hidden">
<!-- Onboarding Container -->
<main class="w-full max-w-[440px] px-margin-mobile md:px-margin-desktop py-lg flex flex-col items-center min-h-screen justify-between relative overflow-hidden">
<!-- Background Ambient Accents -->
<div class="absolute top-[-100px] left-[-100px] w-64 h-64 bg-primary-fixed opacity-20 blur-[100px] rounded-full"></div>
<div class="absolute bottom-[20%] right-[-100px] w-80 h-80 bg-tertiary-fixed opacity-20 blur-[100px] rounded-full"></div>
<!-- Illustration Section (Bento Grid Style) -->
<section class="w-full mt-xl mb-lg relative z-10 grid grid-cols-2 grid-rows-2 gap-sm h-[320px]">
<!-- Hero Card: EcoPoints Counter -->
<div class="col-span-2 row-span-1 bento-glass rounded-xl p-md shadow-sm flex items-center justify-between">
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">Current Balance</span>
<div class="flex items-center gap-xs mt-xs">
<span class="material-symbols-outlined text-primary" data-icon="eco" style="font-variation-settings: 'FILL' 1;">eco</span>
<span class="font-headline-md text-headline-md text-primary">1,250</span>
</div>
</div>
<div class="h-12 w-12 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container" data-icon="stars" style="font-variation-settings: 'FILL' 1;">stars</span>
</div>
</div>
<!-- Leaderboard Card -->
<div class="col-span-1 row-span-1 bento-glass rounded-xl p-md shadow-sm flex flex-col justify-between">
<div class="flex items-center gap-xs mb-sm">
<span class="material-symbols-outlined text-tertiary text-[20px]" data-icon="leaderboard">leaderboard</span>
<span class="font-label-lg text-label-lg text-on-surface">Top Teams</span>
</div>
<div class="space-y-sm">
<div class="flex items-center gap-xs">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<span class="font-label-sm text-label-sm">District A</span>
</div>
<div class="flex items-center gap-xs">
<div class="w-2 h-2 rounded-full bg-primary/40"></div>
<span class="font-label-sm text-label-sm">District C</span>
</div>
</div>
</div>
<!-- Reward Item Card -->
<div class="col-span-1 row-span-1 bg-primary-container rounded-xl p-md shadow-sm flex flex-col justify-center items-center text-center">
<div class="w-14 h-14 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-on-primary-container text-[28px]" data-icon="redeem" style="font-variation-settings: 'FILL' 1;">redeem</span>
</div>
<span class="font-label-lg text-label-lg text-on-primary-container">Unlock Rewards</span>
</div>
</section>
<!-- Content Section -->
<section class="w-full text-center relative z-10 px-sm">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-md">Earn EcoPoints</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[320px] mx-auto leading-relaxed">
                Contribute to a cleaner city and earn EcoPoints to unlock exclusive rewards.
            </p>
</section>
<!-- Navigation Section -->
<footer class="w-full relative z-10 flex flex-col items-center gap-lg mb-xl mt-lg">
<!-- Progress Dots -->
<div class="flex items-center gap-sm">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-6 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
<!-- Actions -->
<div class="w-full flex items-center justify-between gap-md">
<button class="flex-1 px-lg py-md font-label-lg text-label-lg text-secondary bg-transparent rounded-full hover:bg-secondary-container/20 transition-colors active:scale-95">
                    Skip
                </button>
<button class="flex-1 px-lg py-md font-label-lg text-label-lg text-on-primary bg-primary rounded-full shadow-lg hover:bg-primary-container transition-all active:scale-95 flex items-center justify-center gap-sm">
                    Next
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
</main>
</body></html>
