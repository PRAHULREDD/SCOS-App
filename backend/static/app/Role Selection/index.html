<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<!-- Onboarding Flow: Navigation is suppressed as per Rule -->
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-margin-desktop py-xxl">
<div class="max-w-5xl w-full">
<!-- Hero Header Section -->
<header class="text-center mb-xl">
<div class="inline-flex items-center justify-center p-md mb-md bg-primary-container text-on-primary-container rounded-full elevation-1">
<span class="material-symbols-outlined text-3xl" data-icon="eco">eco</span>
</div>
<h1 class="text-headline-lg font-headline-lg text-primary mb-sm">Who are you?</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant max-w-lg mx-auto">
                    Select your profile type to customize your Smart City Operational System experience.
                </p>
</header>
<!-- Role Cards Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-lg">
<!-- Citizen Role -->
<button class="group relative flex flex-col items-center text-center p-xl bg-surface-container-low rounded-xl border-2 border-transparent hover:border-primary hover:bg-surface-container transition-all duration-300 elevation-1 active:scale-95">
<div class="w-24 h-24 mb-lg rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center transition-transform group-hover:scale-110">
<span class="material-symbols-outlined text-5xl" data-icon="person">person</span>
</div>
<h2 class="text-title-lg font-title-lg text-on-surface mb-sm">Citizen</h2>
<p class="text-body-md font-body-md text-on-surface-variant">
                        Report waste issues, track community bins, and view local eco-stats.
                    </p>
<div class="mt-xl opacity-0 group-hover:opacity-100 transition-opacity">
<div class="bg-primary text-on-primary px-lg py-sm rounded-full font-label-lg text-label-lg">
                            Get Started
                        </div>
</div>
</button>
<!-- Driver Role -->
<button class="group relative flex flex-col items-center text-center p-xl bg-surface-container-low rounded-xl border-2 border-transparent hover:border-primary hover:bg-surface-container transition-all duration-300 elevation-1 active:scale-95">
<div class="w-24 h-24 mb-lg rounded-full bg-primary-fixed text-on-primary-fixed flex items-center justify-center transition-transform group-hover:scale-110">
<span class="material-symbols-outlined text-5xl" data-icon="local_shipping">local_shipping</span>
</div>
<h2 class="text-title-lg font-title-lg text-on-surface mb-sm">Driver</h2>
<p class="text-body-md font-body-md text-on-surface-variant">
                        Access route logistics, bin sensor data, and collection task lists.
                    </p>
<div class="mt-xl opacity-0 group-hover:opacity-100 transition-opacity">
<div class="bg-primary text-on-primary px-lg py-sm rounded-full font-label-lg text-label-lg">
                            Log In
                        </div>
</div>
</button>
<!-- Admin Role -->
<button class="group relative flex flex-col items-center text-center p-xl bg-surface-container-low rounded-xl border-2 border-transparent hover:border-primary hover:bg-surface-container transition-all duration-300 elevation-1 active:scale-95">
<div class="w-24 h-24 mb-lg rounded-full bg-tertiary-fixed text-on-tertiary-fixed flex items-center justify-center transition-transform group-hover:scale-110">
<span class="material-symbols-outlined text-5xl" data-icon="dashboard">dashboard</span>
</div>
<h2 class="text-title-lg font-title-lg text-on-surface mb-sm">Admin</h2>
<p class="text-body-md font-body-md text-on-surface-variant">
                        Manage fleet operations, analyze system efficiency, and oversee city-wide data.
                    </p>
<div class="mt-xl opacity-0 group-hover:opacity-100 transition-opacity">
<div class="bg-primary text-on-primary px-lg py-sm rounded-full font-label-lg text-label-lg">
                            Admin Portal
                        </div>
</div>
</button>
</div>
<!-- Footer Help Section -->
<footer class="mt-xxl text-center">
<div class="inline-flex flex-col items-center gap-base">
<p class="text-label-lg font-label-lg text-outline">Need help with your credentials?</p>
<a class="text-primary font-title-md text-title-md hover:underline decoration-2 underline-offset-4" href="#">Contact Municipal Support</a>
</div>
</footer></div>
