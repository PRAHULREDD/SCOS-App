<!DOCTYPE html>

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  
    <script src="https://cdn.jsdelivr.net/npm/@capacitor/core/dist/capacitor.js"></script>
    <script src="../../js/mobile.js"></script>
    <style>body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }</style>
</head>
<body class="bg-surface text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Top AppBar Component -->
<header class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md docked full-width top-0 sticky z-50 border-b border-slate-100 dark:border-slate-800 shadow-sm">
<div class="flex justify-between items-center px-4 py-3 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-container">
<img alt="User Avatar" class="w-full h-full object-cover" data-alt="professional headshot of a friendly man in his 30s with short hair and a warm smile, soft daylight studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAGdYFLOlwXhc_b2OBx2UIc3bx4Ds0bWUPWaTTP4N-HR7WBo82sj1IcIB6xEw6zzZUAUiN0wtPDEPTVaqR3fWaYtG4gP4rtwU_xIFIVX5SjN2qtsoep6W866AR6xujN1IfgoqymRrmQZlOMO2O24b9WF5ZbQY1p_3YDRJm3tTuVLqEzidf8TnQu5VMSBO15sw-1UAjE1wqSwqebq7ADZPMxf7LMzSZzApgGOMG2RPQoce3nW6oMynyb89q1AbnowXNJFNdy5T3aLJxu"/>
</div>
<h1 class="text-xl font-bold tracking-tight text-emerald-800 dark:text-emerald-300">SCOS</h1>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-emerald-700 dark:text-emerald-400 p-2 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors active:opacity-70" data-icon="notifications">notifications</button>
</div>
</div>
</header>
<main class="relative min-h-[calc(100vh-128px)] overflow-hidden">
<!-- Interactive Heatmap Canvas -->
<div class="absolute inset-0 z-0">
<img alt="City Map Background" class="w-full h-full object-cover opacity-80" data-alt="high altitude detailed satellite map of a modern urban city with streets, buildings, and parks, soft color grading" data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC8vWjVCaHjo_EZGMlIy7iyXzKxgI5oTd08b-beQJusxUfF20jUXwnyK7aHr3r2FQRFbDihFOG06vpjUEFEVbchdZTbNT5kKzwi-0KXsgMckcQJGbRBoOh7hOaIUsfMcufEfjJht3uo5nxCrtY7gC0zT7DFuDyWex-CRHx-LGc5mYz0zyO3nIifuJczRWWQp4OT2Z-s2GTqr5bBzVP6_t8Pcd5z6nYYay3OsSgZsFm4yxCqXwdIzniAJnBFXMjQteN3baVCB2dLjk-w"/>
<!-- Heatmap Overlays (Simulated) -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-1/4 left-1/4 w-64 h-64 bg-primary/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-1/3 right-1/4 w-80 h-80 bg-error/20 rounded-full blur-[80px]"></div>
<div class="absolute top-1/2 left-1/2 w-72 h-72 bg-amber-400/20 rounded-full blur-3xl"></div>
</div>
<!-- Map Markers -->
<!-- Critical Bin -->
<div class="absolute top-[40%] left-[60%] -translate-x-1/2 -translate-y-1/2 group cursor-pointer">
<div class="relative">
<div class="w-10 h-10 bg-error rounded-full flex items-center justify-center text-white border-2 border-white shadow-lg transform transition-transform group-hover:scale-110">
<span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
</div>
<div class="absolute top-full mt-2 bg-white px-2 py-1 rounded-lg shadow-md border border-slate-100 whitespace-nowrap hidden group-hover:block">
<p class="font-label-lg text-on-surface">Central Plaza • 95% Full</p>
</div>
</div>
</div>
<!-- Clean Bin -->
<div class="absolute top-[25%] left-[35%] -translate-x-1/2 -translate-y-1/2 group cursor-pointer">
<div class="relative">
<div class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-white border-2 border-white shadow-lg transform transition-transform group-hover:scale-110">
<span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
</div>
<div class="absolute top-full mt-2 bg-white px-2 py-1 rounded-lg shadow-md border border-slate-100 whitespace-nowrap hidden group-hover:block">
<p class="font-label-lg text-on-surface">Oak Street • 12% Full</p>
</div>
</div>
</div>
<!-- Attention Bin -->
<div class="absolute bottom-[45%] left-[20%] -translate-x-1/2 -translate-y-1/2 group cursor-pointer">
<div class="relative">
<div class="w-10 h-10 bg-amber-500 rounded-full flex items-center justify-center text-white border-2 border-white shadow-lg transform transition-transform group-hover:scale-110">
<span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
</div>
<div class="absolute top-full mt-2 bg-white px-2 py-1 rounded-lg shadow-md border border-slate-100 whitespace-nowrap hidden group-hover:block">
<p class="font-label-lg text-on-surface">Riverside Walk • 65% Full</p>
</div>
</div>
</div>
</div>
<!-- Search Bar Floating UI -->
<div class="absolute top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-lg z-10">
<div class="bg-white/95 dark:bg-slate-900/95 backdrop-blur-md rounded-full shadow-lg border border-slate-100 dark:border-slate-800 flex items-center px-4 py-2">
<span class="material-symbols-outlined text-slate-400 mr-2" data-icon="search">search</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-body-md text-on-surface placeholder:text-slate-400" placeholder="Search for neighborhood or bin..." type="text"/>
<button class="material-symbols-outlined text-emerald-700 ml-2" data-icon="my_location">my_location</button>
</div>
</div>
<!-- Heatmap Legend Floating UI -->
<div class="absolute bottom-28 left-4 z-10">
<div class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md rounded-2xl p-4 shadow-lg border border-slate-100 dark:border-slate-800">
<h3 class="font-title-md mb-3 text-on-surface">Cleanliness Level</h3>
<div class="space-y-2">
<div class="flex items-center gap-3">
<div class="w-3 h-3 rounded-full bg-primary"></div>
<span class="font-label-lg text-slate-600">Green (Clean)</span>
</div>
<div class="flex items-center gap-3">
<div class="w-3 h-3 rounded-full bg-amber-500"></div>
<span class="font-label-lg text-slate-600">Yellow (Attention)</span>
</div>
<div class="flex items-center gap-3">
<div class="w-3 h-3 rounded-full bg-error"></div>
<span class="font-label-lg text-slate-600">Red (Critical)</span>
</div>
</div>
</div>
</div>
<!-- Right Side Floating Actions -->
<div class="absolute bottom-28 right-4 z-10 flex flex-col gap-3">
<button class="w-14 h-14 bg-white rounded-2xl shadow-lg border border-slate-100 flex items-center justify-center text-emerald-800 hover:bg-slate-50 transition-colors">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
<button class="w-14 h-14 bg-primary text-white rounded-2xl shadow-lg flex items-center justify-center transform active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="add_report">report</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar Component -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 py-3 pb-safe bg-white dark:bg-slate-950 z-50 border-t border-slate-200 dark:border-slate-800 shadow-[0_-4px_12px_rgba(46,49,51,0.08)] rounded-t-2xl">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-1.5 hover:text-emerald-600 dark:hover:text-emerald-300 transition-transform duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Inter'] text-[12px] font-medium mt-1">Home</span>
</a>
<!-- Map (ACTIVE) -->
<a class="flex flex-col items-center justify-center bg-emerald-100 dark:bg-emerald-900/40 text-emerald-900 dark:text-emerald-100 rounded-2xl px-5 py-1.5 transition-transform duration-200 scale-95 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-['Inter'] text-[12px] font-medium mt-1">Map</span>
</a>
<!-- Tasks -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-1.5 hover:text-emerald-600 dark:hover:text-emerald-300 transition-transform duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="assignment">assignment</span>
<span class="font-['Inter'] text-[12px] font-medium mt-1">Tasks</span>
</a>
<!-- Reports -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-1.5 hover:text-emerald-600 dark:hover:text-emerald-300 transition-transform duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Inter'] text-[12px] font-medium mt-1">Reports</span>
</a>
<!-- Stats -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-1.5 hover:text-emerald-600 dark:hover:text-emerald-300 transition-transform duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-['Inter'] text-[12px] font-medium mt-1">Stats</span>
</a>
</nav>
<script src="../../js/toast.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/admin.js"></script>
</body></html>
