<h1 class="text-xl font-bold tracking-tight text-emerald-800 dark:text-emerald-300 font-['Inter']">SCOS</h1>

<button class="w-10 h-10 flex items-center justify-center text-slate-500 hover:bg-slate-50 rounded-full transition-colors active:opacity-70">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<main class="max-w-7xl mx-auto px-4 mt-6">
<!-- Section Header -->
<div class="mb-6">
<h2 class="font-headline-md text-headline-md text-on-surface">Report History</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Track your submitted municipal waste reports and collection status.</p>
</div>
<!-- Complaints List -->
<div id="complaints-list" class="space-y-4">
    <!-- Reports will be dynamically loaded here by citizen.js -->
    <div class="py-8 flex flex-col items-center justify-center text-center opacity-50">
        <span class="material-symbols-outlined text-4xl animate-spin mb-4" data-icon="sync">sync</span>
        <p>Loading your reports...</p>
    </div>
</div>
</main>
<!-- FAB for New Complaint (Contextual Context - although suppressed on some screens, it's highly relevant for a history screen to 'Add New') -->
<button class="fixed bottom-24 right-6 w-16 h-16 bg-primary text-white rounded-full shadow-lg flex items-center justify-center active:scale-90 transition-transform z-40">
<span class="material-symbols-outlined text-3xl" data-icon="add_a_photo" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
</button>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 py-3 pb-safe bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 shadow-[0_-4px_12px_rgba(46,49,51,0.08)] z-50 rounded-t-2xl">

<span class="material-symbols-outlined" data-icon="home">home</span>

</a>

<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="font-['Inter'] text-[12px] font-medium">Map</span>
</a>

<span class="material-symbols-outlined" data-icon="assignment" style="font-variation-settings: 'FILL' 1;">assignment</span>
<span class="font-['Inter'] text-[12px] font-medium">Tasks</span>
</a>
<!-- Reports -->

<span class="material-symbols-outlined" data-icon="history">history</span>
