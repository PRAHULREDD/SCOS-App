<body class="bg-surface font-body-md text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md font-['Inter'] font-semibold text-lg docked full-width top-0 sticky z-50 border-b border-slate-100 dark:border-slate-800 shadow-sm">
<div class="flex justify-between items-center px-4 py-3 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl" data-icon="recycling">recycling</span>
</div>
<span class="text-xl font-bold tracking-tight text-emerald-800 dark:text-emerald-300">SCOS</span>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors active:opacity-70">
<span class="material-symbols-outlined text-slate-500" data-icon="notifications">notifications</span>
</button>
<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a professional municipal worker in a reflective safety vest, warm natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBcjoQd575aQDV93CuDHGtYwN4asoyVzP2KmXnQDxPynvWCyA20dZGo0JFIthK0oN9F5Kr737iZobb97zA3YA9jkHxJVeUwr28bc-Gm8oC7v7sdTVlTetqEe9o_KpnKsi1WQYMWUmr9refpsgJw9prWi04qsaDOMwKQbM0btyuMDVzX0MUkHq_ICNVHVp-FNqbGnZ1lRzYeTne1NnWg5l496N-v8ho7cjk1_UNw5tw_0w_AiEH2-UinUfD8LOde8CznvC8G8tMGuzJS"/>
</div>
</div>
</div>
</header>
<form id="pickup-verification-form" class="max-w-xl mx-auto px-margin-mobile py-lg space-y-lg">
<input type="file" id="proof-image" accept="image/*" class="hidden">
<input type="hidden" id="complaint-id" value="1">
<!-- Task Header Card -->
<section class="bg-surface-container-low rounded-xl p-md shadow-sm border border-outline-variant/30">
<div class="flex justify-between items-start mb-sm">
<div>
<span class="font-label-sm text-label-sm text-primary uppercase tracking-wider">Current Task</span>
<h1 class="font-headline-md text-headline-md text-on-surface">Bin #4429-B</h1>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-sm" data-icon="location_on">location_on</span>
                        Oak Ridge Residential Complex
                    </p>
</div>
<div class="bg-error-container text-on-error-container px-3 py-1 rounded-full font-label-lg text-label-lg flex items-center gap-1">
<span class="material-symbols-outlined text-sm fill-icon" data-icon="warning">warning</span>
                    95% Full
                </div>
</div>
<div class="flex gap-md mt-md">
<div class="flex-1 bg-white p-sm rounded-lg border border-outline-variant/20">
<span class="block font-label-sm text-label-sm text-outline">Type</span>
<span class="font-title-md text-title-md">Recyclables</span>
</div>
<div class="flex-1 bg-white p-sm rounded-lg border border-outline-variant/20">
<span class="block font-label-sm text-label-sm text-outline">Scheduled</span>
<span class="font-title-md text-title-md">09:45 AM</span>
</div>
</div>
</section>
<!-- Image Upload Section -->
<section class="space-y-sm">
<h2 class="font-title-md text-title-md px-1">Upload Proof</h2>
<button class="w-full aspect-video bg-secondary-container/30 border-2 border-dashed border-primary/30 rounded-2xl flex flex-col items-center justify-center gap-md hover:bg-secondary-container/50 transition-all active:scale-[0.98]">
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-white text-3xl" data-icon="photo_camera" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</div>
<div class="text-center">
<p class="font-title-md text-title-md text-primary">Tap to Capture Photo</p>
<p class="font-label-lg text-label-lg text-on-surface-variant">Required for verification</p>
</div>
</button>
<script>
    document.querySelector('button.aspect-video').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('proof-image').click();
    });
    document.getElementById('proof-image').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            document.querySelector('button.aspect-video p.text-primary').innerText = file.name;
            document.querySelector('button.aspect-video p.text-on-surface-variant').innerText = "Tap again to change";
        }
    });
</script>
<!-- Mock Thumbnail of Captured Image (Hidden state logic simulated) -->
<div class="hidden grid-cols-2 gap-md mt-sm">
<div class="relative rounded-xl overflow-hidden aspect-square border border-outline-variant shadow-sm">
<img alt="Waste bin" class="w-full h-full object-cover" data-alt="Close-up of an overflowing green municipal recycling bin in an urban residential parking area during daylight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBGw9Qq36Ts5VS5-qm8EjI9WIkCLZV-uKpWI5QMVn8tz7Q5y3YQgB_uL6lZHZdEL0_Obf3V3Jg2QmaztQI4b8w9Z1YPUlIFjmxTL7T1uIIOAWwV_Hv65rbQkO6SOy_OqDrp3dCy53ZEcb2imz7KRQsc-5hrg7ncewq7cYjybSZXkAJPjvWxhCmMUxW3wqBfP96Yr924uNloGaz-1yg_cn6JvtzVIzq2mXQA7gw33R45mnvHbh8WrW4ASakgt2chWthxNWtn7f6DJvdq"/>

<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
</div>
</div>
</section>
<!-- Waste Level Selection -->
<section class="space-y-sm">
<h2 class="font-title-md text-title-md px-1">Current Waste Level</h2>
<div class="grid grid-cols-3 gap-sm">
<!-- Level: Empty -->
<button class="flex flex-col items-center gap-sm p-md rounded-2xl border border-outline-variant hover:border-primary/50 transition-colors">
<div class="w-12 h-2 bg-slate-200 rounded-full overflow-hidden"></div>
<span class="font-label-lg text-label-lg text-slate-500">Empty</span>
</button>
<!-- Level: Partial -->
<button class="flex flex-col items-center gap-sm p-md rounded-2xl border border-outline-variant hover:border-primary/50 transition-colors">
<div class="w-12 h-2 bg-primary/20 rounded-full overflow-hidden">
<div class="w-1/2 h-full bg-primary"></div>
</div>
<span class="font-label-lg text-label-lg text-slate-500">Partial</span>
</button>
<!-- Level: Full (Active State) -->
<button class="flex flex-col items-center gap-sm p-md rounded-2xl border-2 border-primary bg-primary-container/10">
<div class="w-12 h-2 bg-error/20 rounded-full overflow-hidden">
<div class="w-full h-full bg-error"></div>
</div>
<span class="font-label-lg text-label-lg text-primary font-bold">Full</span>
</button>
</div>
</section>
<!-- Dropdown for Issues -->
<section class="space-y-sm">
<label class="font-title-md text-title-md px-1 block">Report an Issue (Optional)</label>
<div class="relative">
<select class="w-full h-14 pl-md pr-xl bg-surface border border-outline-variant rounded-xl appearance-none focus:ring-2 focus:ring-primary focus:border-transparent outline-none font-body-md">
<option>None / No issues</option>
<option>Bin Damaged</option>
<option>Contaminated Waste</option>
<option>Area Blocked / No Access</option>
<option>Illegal Dumping Nearby</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline" data-icon="expand_more">expand_more</span>
</div>
</section>
<!-- Confirm Action -->
<div class="pt-lg">
<button type="submit" class="w-full h-14 bg-primary text-on-primary rounded-full font-title-lg text-title-lg shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2">
<span class="material-symbols-outlined fill-icon" data-icon="check_circle">check_circle</span>
                Confirm Pickup
            </button>
<p class="text-center font-label-sm text-label-sm text-outline mt-md">Verified GPS: 40.7128° N, 74.0060° W</p>
</div>
</form>
