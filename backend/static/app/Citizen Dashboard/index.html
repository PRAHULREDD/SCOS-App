<body class="bg-surface font-body-md text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-100 dark:border-slate-800 shadow-sm docked full-width top-0 sticky z-50">
<div class="flex justify-between items-center px-4 py-3 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-emerald-100 ring-2 ring-emerald-500/10">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close up portrait of a smiling young professional man in a sustainable urban office setting with natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgXwQAbu7_Kix7MGyQaQ0zgYCScxyS_3ueVSTk1bBHe426PO_R8VUrl0tl8HZiZDGat2Op7WQ4SkzhRARtFgPeCASW80TZGz5Gsy4GtMl6ngqox32a4JeIFSdO7cVHzkdhe5bdGHofbDhfJXVobDAy8whJa2iJlpPetko_wkCe5pPjtYKQLGNxdm-Ez1db09vwN_ABcvC-82b_xLJZeViK1tOVZ47rrkLrhlOAz3T-KxcbAGLnZBkk3Y-QxBaufhWz2gXSatQaefUx"/>
</div>
<span class="text-xl font-bold tracking-tight text-emerald-800 dark:text-emerald-300">SCOS</span>
</div>
<div class="flex items-center gap-4">
<button id="btn-notifications" class="material-symbols-outlined text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 p-2 rounded-full transition-all active:opacity-70" data-icon="notifications">notifications</button>
</div>
</div>
</header>
<main class="max-w-7xl mx-auto px-margin-mobile md:px-margin-desktop py-md">
<!-- Hero / Stats Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-gutter">
<!-- Cleanliness Score Card -->
<div class="md:col-span-8 bg-surface-container-low rounded-xl p-lg border border-outline-variant/30 flex flex-col justify-between min-h-[240px] relative overflow-hidden group">
<div class="absolute top-0 right-0 p-lg">
<span class="material-symbols-outlined text-emerald-700/20 text-7xl select-none" data-icon="energy_savings_leaf">energy_savings_leaf</span>
</div>
<div>
<h2 class="font-title-lg text-title-lg text-primary mb-xs">Neighborhood Wellness</h2>
<p id="cleanliness-message" class="font-body-md text-body-md text-on-surface-variant max-w-xs">Loading neighborhood data...</p>
</div>
<div class="mt-xl flex items-end gap-md">
<div class="flex flex-col">
<span id="cleanliness-score-display" class="font-display-lg text-[64px] font-bold leading-none text-primary">--</span>
<span class="font-label-lg text-label-lg text-secondary uppercase tracking-widest">Cleanliness Score</span>
</div>
<div class="flex-grow h-12 flex items-end gap-1 pb-1">
<div class="w-2 bg-emerald-200 h-1/2 rounded-full"></div>
<div class="w-2 bg-emerald-300 h-3/4 rounded-full"></div>
<div class="w-2 bg-emerald-400 h-2/3 rounded-full"></div>
<div class="w-2 bg-emerald-500 h-5/6 rounded-full"></div>
<div class="w-2 bg-primary h-full rounded-full"></div>
</div>
</div>
</div>
<!-- EcoPoints Balance Card -->
<div class="md:col-span-4 bg-primary-container text-on-primary-container rounded-xl p-lg flex flex-col justify-between shadow-sm relative overflow-hidden">
<div class="absolute -bottom-8 -right-8 w-32 h-32 bg-on-primary-container/10 rounded-full blur-2xl"></div>
<div>
<div class="flex justify-between items-start">
<span class="font-label-lg text-label-lg uppercase tracking-wider opacity-80">EcoPoints Balance</span>
<span class="material-symbols-outlined" data-icon="stars" style="font-variation-settings: 'FILL' 1;">stars</span>
</div>
<div class="mt-sm">
<span id="eco-points-display" class="font-headline-lg text-headline-lg font-extrabold tracking-tight">1,450</span>
</div>
</div>
<div class="mt-xl">
<button class="w-full py-3 px-4 bg-on-primary-container text-primary-container font-label-lg rounded-full flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all">
                        Redeem Rewards
                        <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
<!-- Recent Reports Section -->
<div class="md:col-span-12 mt-md">
<div class="flex justify-between items-center mb-md">
<h3 class="font-title-md text-title-md text-on-surface">Recent Reports</h3>
<button onclick="window.location.href='../Complaint History/index.html'" class="text-primary font-label-lg flex items-center gap-1 hover:underline">
                        View all <span class="material-symbols-outlined text-sm" data-icon="open_in_new">open_in_new</span>
</button>
</div>
<div id="complaints-list" class="space-y-sm">
    <div class="py-4 flex flex-col items-center justify-center text-center opacity-50">
        <span class="material-symbols-outlined text-4xl animate-spin mb-2" data-icon="sync">sync</span>
        <p class="text-sm">Loading recent reports...</p>
    </div>
</div>
</div>
<!-- Contextual Map Snippet -->
<div class="md:col-span-12 mt-md rounded-2xl overflow-hidden h-48 relative border border-outline-variant/20">
<img alt="Local Map" class="w-full h-full object-cover grayscale opacity-50 contrast-125" data-alt="Stylized clean minimalist map of a city neighborhood with emerald green park markers and soft gray streets" data-location="Stockholm" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC-Mrm3Kd-IyJl86c3X3s4p9Al2iXYzBxXss1oWDCEp5RzGa1I4x_6KNRlBCDIB1lWeN76OH-dYYe9C76qusbxqPHF6M8z0DXDzrWnrKsQGLKCxKr6k8lNq2jU8tfK1HshOWTELRhoV5wnWjOG_dUI1Zw2zUKmbd1vHvV2GlMyT_QNkXYGDsWlpvalQ1LVkQf_mfkFxT3R6C4u3N1iohVeL6ys772KxWjIhs7FB1RTFkKKHFPYWL98AAyLPX4tSQN08lCe5a_G2eBN1"/>
<div class="absolute inset-0 flex items-center justify-center bg-gradient-to-t from-surface/80 to-transparent">
<button onclick="window.location.href='../Cleanliness Heatmap/index.html'" class="bg-white px-md py-sm rounded-full shadow-lg flex items-center gap-2 font-label-lg text-primary border border-primary/20 active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
                        Explore Nearby Bins
                    </button>
</div>
</div>
</div>
</main>

<span class="material-symbols-outlined text-3xl" data-icon="add_a_photo" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
<span class="absolute right-full mr-4 bg-inverse-surface text-inverse-on-surface px-3 py-1.5 rounded-lg text-sm font-medium opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">Report Waste</span>
</button>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 py-3 pb-safe bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 shadow-[0_-4px_12px_rgba(46,49,51,0.08)] z-50">
<!-- Home (Active) -->
<a class="flex flex-col items-center justify-center bg-emerald-100 dark:bg-emerald-900/40 text-emerald-900 dark:text-emerald-100 rounded-2xl px-5 py-1.5 transition-transform duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined pill-active" data-icon="home">home</span>
<span class="font-['Inter'] text-[12px] font-medium">Home</span>
</a>
<!-- Map -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-1.5 hover:text-emerald-600 dark:hover:text-emerald-300 transition-transform duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="font-['Inter'] text-[12px] font-medium">Map</span>
</a>
<!-- Tasks -->

<span class="material-symbols-outlined" data-icon="assignment">assignment</span>
<span class="font-['Inter'] text-[12px] font-medium">Tasks</span>
</a>
<!-- Reports -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-1.5 hover:text-emerald-600 dark:hover:text-emerald-300 transition-transform duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Inter'] text-[12px] font-medium">Reports</span>
</a>
<!-- Stats -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-1.5 hover:text-emerald-600 dark:hover:text-emerald-300 transition-transform duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-['Inter'] text-[12px] font-medium">Stats</span>
</a>
